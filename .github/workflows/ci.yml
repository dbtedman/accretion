name: "ci"

on:
    pull_request:
        branches:
            - "main"
    push:
        branches:
            - "main"

permissions: "read-all"

jobs:
    linux:
        runs-on: "ubuntu-latest"

        steps:
            -   name: "Checkout Code"
                uses: "actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608"
            -   name: "Setup Go"
                uses: "actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb496313a4491"
                with:
                    go-version-file: "./go.mod"
            -   name: "Test"
                run: "make test"
