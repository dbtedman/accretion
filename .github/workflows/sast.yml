---
name: "sast"

on:
    pull_request:
        branches:
            - "main"
    push:
        branches:
            - "main"
    schedule:
        - cron: "0 0 11 * *"

permissions: "read-all"

jobs:
    snyk:
        permissions:
            contents: "read"
            security-events: "write"
        runs-on: "ubuntu-latest"
        steps:
            - uses: "actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8"
            - uses: "pnpm/action-setup@c3b53f6a16e57305370b4ae5a540c2077a1d50dd"
              with:
                  version: "latest"
            - uses: "actions/setup-node@8c91899e586c5b171469028077307d293428b516"
              with:
                  node-version-file: ".nvmrc"
                  cache: "pnpm"
            - uses: "actions/setup-go@d0a58c1c4d2b25278816e339b944508c875f3613"
              with:
                  go-version-file: "./go.mod"
            - uses: "snyk/actions/setup@1cc9026f51d822442cb4b872d8d7ead8cc69a018"
            - run: "make install"
            - run: "snyk test --all-projects --detection-depth=1 --severity-threshold=high --sarif-file-output=snyk.sarif"
              continue-on-error: true
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
            - uses: "github/codeql-action/upload-sarif@b2a92eb56d8cb930006a1c6ed86b0782dd8a4297"
              with:
                  sarif_file: "snyk.sarif"

    codeql:
        runs-on: "ubuntu-latest"
        permissions:
            actions: read
            contents: read
            security-events: write
        steps:
            - uses: "actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8"
            - uses: "github/codeql-action/init@a669cc5936cc5e1b6a362ec1ff9e410dc570d190"
              with:
                  languages: "go"
            - uses: "pnpm/action-setup@c3b53f6a16e57305370b4ae5a540c2077a1d50dd"
              with:
                  version: "latest"
            - uses: "actions/setup-node@8c91899e586c5b171469028077307d293428b516"
              with:
                  node-version-file: ".nvmrc"
                  cache: "pnpm"
            - uses: "actions/setup-go@d0a58c1c4d2b25278816e339b944508c875f3613"
              with:
                  go-version-file: "./go.mod"
            - run: "make install"
            - uses: "github/codeql-action/analyze@a669cc5936cc5e1b6a362ec1ff9e410dc570d190"
