linters:
    disable-all: true
    enable:
        - bodyclose
        - depguard
        - dogsled
        - dupl
        - errcheck
        - exportloopref
        - funlen
        - gochecknoinits
        - goconst
        - gocritic
        - gocyclo
        - gofmt
        - goimports
        - gomnd
        - goprintffuncname
        # https://github.com/securego/gosec
        # TODO: - gosec
        - gosimple
        - govet
        - ineffassign
        - lll
        - misspell
        - nakedret
        - noctx
        - nolintlint
        - staticcheck
        - stylecheck
        - typecheck
        - unconvert
        - unparam
        - unused
        - whitespace
        - asciicheck
        - gochecknoglobals
        - gocognit
        - godot
        #        - godox
        - goerr113
        - nestif
        - prealloc
        - testpackage
        - revive
#        - wsl
